name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        bun-version: [latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Run linter
        run: bun run lint

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Verify build output
        run: |
          if [ ! -f dist/index.js ]; then
            echo "Build failed - dist/index.js not found"
            exit 1
          fi
          if ! head -n 1 dist/index.js | grep -q "#!/usr/bin/env node"; then
            echo "Build failed - shebang missing"
            exit 1
          fi
          echo "✓ Build verification passed"

      - name: Test CLI help
        run: node dist/index.js --help

  test-node:
    name: Test with Node.js
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Bun (for building)
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test CLI with Node.js ${{ matrix.node-version }}
        run: node dist/index.js --help
